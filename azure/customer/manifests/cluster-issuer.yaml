# Let's Encrypt ClusterIssuer for the ingress TLS cert. cert-manager (installed
# by addons.tf) reconciles this. HTTP-01 is solved through ingress-nginx.
#
# This is a custom resource, applied OUT-OF-BAND after `terraform apply` (the
# cert-manager CRDs must exist first) — the same split the AWS/GCP roots use for
# leaving the chart's CRs to the deploy step. Apply with:
#   kubectl apply -f manifests/cluster-issuer.yaml
#
# Replace <ops-email> with a real contact address before applying.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <ops-email>
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
